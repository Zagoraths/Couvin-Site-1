<!doctype html>
<html lang="fr">
  <head>
    <title>Site 1 - Titre du document</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="texte.css" />
    <title>Site 1 - Contactez-nous !</title>
  </head>

  <body>
    <header>
      <h1>Hello Couvin</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="contacte.html">Contact</a>
      </nav>
    </header>
    <main>
      <section>
        <h2>Contactez-nous !</h2>
        <div class="colonnes">
          <div class="colonne">Formulaire</div>
          <h3>Par email</h3>
          <form>
            <div class="control">
              <label for="lastname">Nom</label>
              <input type="text" id="lastname" required />*
            </div>
            <div class="control">
              <label for="firstname">Prénom</label>
              <input type="text" id="firstname" />
            </div>
            <div class="control">
              <label for="email">Email</label>
              <input
                type="email"
                required
                id="email"
                placeholder="user@site.com"
              />*
            </div>
            <div class="control">
              <label for="profil">Profil</label>
              <select name="" id="profil">
                <option value="DE">Demandeur d'emploi</option>
                <option value="TRAV">Travailleur</option>
              </select>
            </div>
            <div class="control">
              <label for="message">Message</label>
              <textarea name="" id="message"></textarea>*
            </div>
            <div class="control">
              <label for=""></label>
              <button>Envoyer</button>
            </div>
          </form>
          <div class="colonne">
            <iframe
              width="425"
              height="350"
              src="https://www.openstreetmap.org/export/embed.html?bbox=4.437017440795899%2C50.03001930511544%2C4.550313949584962%2C50.077633570782616&amp;layer=mapnik"
              style="border: 1px solid black"
            ></iframe
            ><br /><small
              ><a href="https://www.openstreetmap.org/?#map=14/50.05383/4.49367"
                >View Larger Map</a
              ></small
            >
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
